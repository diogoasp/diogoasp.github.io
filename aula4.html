<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <title>Tabelas</title>
  </head>
  <body>
    <p>
      <h2>Célula com 2 colunas:</h2>
    </p>
    <table border="1">
      <tr>
        <th colspan="1">Nome</th>
        <th colspan="2">Telefone</th>
      </tr>
      <tr>
        <td>José das Colves</td>
        <td>(22)2726-6677</td>
        <td>(22)27267766</td>
      </tr>
    </table>
    <br>
    <h2>Célula com 2 linhas:</h2>
    <table border="1">
      <tr>
        <th colspan="1">Nome: </th>
        <td>José das Colves</td>
      </tr>
      <tr>
        <th rowspan="2">Telefone: </th>
        <td>(22)2726-6677</td>
      </tr>
      <tr>
        <td>(22)27267766</td>
      </tr>
    </table>
    <br>
    <h2>Tabela com legenda</h2>
    <table border="1">
        <caption border="2">Total de despesas por mes</caption>
        <tr>
          <th>Mês</th>
          <th>Total</th>
        </tr>
        <tr>
          <th>Janeiro</th>
          <th>R$ 1.500,00</th>
        </tr>
        <tr>
          <td>Fevereiro</td>
          <td>R$ 1.470,00</td>
        </tr>
    </table>
  </body>
</html>
